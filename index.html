<script>
// GitHub Pages用ストレージポリフィル - loadStateより前に必ず定義
window.storage = {
  async get(key) {
    const val = localStorage.getItem('mf2_' + key);
    if (val === null) throw new Error('not found');
    return { key, value: val };
  },
  async set(key, value) {
    try {
      localStorage.setItem('mf2_' + key, typeof value === 'string' ? value : JSON.stringify(value));
      return { key, value };
    } catch(e) { return null; }
  },
  async delete(key) {
    localStorage.removeItem('mf2_' + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = Object.keys(localStorage)
      .filter(k => k.startsWith('mf2_' + (prefix || '')))
      .map(k => k.replace('mf2_', ''));
    return { keys };
  }
};
</script>

<script>
const BATTLE_TIME = 60, INIT_GUTS = 50, GUTS_PER_RECOVERY = 30;

function calcIdeal(gutsCost, motionTime, gutsRecovery) {
  const rps = GUTS_PER_RECOVERY / gutsRecovery;
  let g = INIT_GUTS, t = 0, n = 0;
  while (t < BATTLE_TIME) {
    if (g < gutsCost) { t += (gutsCost - g) / rps; g = gutsCost; if (t >= BATTLE_TIME) break; }
    if (t + motionTime > BATTLE_TIME) break;
    g -= gutsCost; t += motionTime; n++;
  }
  return n;
}

  "モノリス":[{from:"針ぶっさし",to:"超針ぶっさし",need:50,guts:21,hit:2.5,miss:2.5},{from:"フォームアルファ",to:"フォームベータ",need:50,guts:35,hit:3.8,miss:3.3},{from:"フォームベータ",to:"フォームガンマ",need:50,guts:40,hit:4.5,miss:4.3},{from:"たおれこみ",to:"大たおれこみ",need:30,guts:12,hit:5.1,miss:2.1},{from:"大たおれこみ",to:"超たおれこみ",need:30,guts:15,hit:4.1,miss:1.8},{from:"アタック",to:"２連アタック",need:50,guts:35,hit:5.5,miss:4.8},{from:"２連アタック",to:"３連アタック",need:50,guts:45,hit:5.5,miss:4.8},{from:"トリオビームX",to:"トリオビームY",need:50,guts:24,hit:3.8,miss:1.5},{from:"トリオビームY",to:"トリオビームZ",need:50,guts:29,hit:5.1,miss:2.3}],
  "ラウー":[{from:"ボム",to:"ハイパーボム",need:50,guts:19,hit:6.1,miss:3.8}],
  "ワーム":[{from:"サマーソルト",to:"Wサマーソルト",need:50,guts:26,hit:3.5,miss:3.5},{from:"しっぽキック",to:"Wしっぽキック",need:50,guts:19,hit:4.8,miss:3.3},{from:"Wしっぽキック",to:"３連しっぽキック",need:50,guts:27,hit:4.8,miss:2.8}],
  "ナーガ":[{from:"魔空弾",to:"連続魔空弾",need:25,guts:17,hit:4.3,miss:2.5}]
};

// 使い込みなし種族（グリッド表示するが追加不可）
const NO_TECH = new Set(["ライガー","スエゾー","ジョーカー"]);

// state: techHistoryは {モンスター名: {技キー: {total, done}}} で保持
let state = {monsters:[], current:null, gutsRecovery:15, techHistory:{}};
let techCheckState = {};

function techKey(t){ return t.from+"→"+t.to; }


function toggleGrid() {
  const grid = document.getElementById("monsterGrid");
  const btn = document.getElementById("gridToggleBtn");
  const isOpen = grid.style.display !== "none";
  grid.style.display = isOpen ? "none" : "grid";
  btn.textContent = isOpen ? "＋ 種族を選んで追加" : "✕ 閉じる";
}
async function loadState() {
  try {
    const val = localStorage.getItem("mf2_mf2v8_state");
    if (val) state = JSON.parse(val);
  } catch(e){}
  if (!state.monsters) state.monsters = [];
  if (!state.gutsRecovery) state.gutsRecovery = 15;
  if (!state.techHistory) state.techHistory = {};
  initGutsSelect();
  renderGrid();
  renderAll();
}

function saveState() {
  try { localStorage.setItem("mf2_mf2v8_state", JSON.stringify(state)); showSaveIndicator(); } catch(e){}
}

function showSaveIndicator() {
  const el = document.getElementById("saveIndicator");
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1500);
}

function initGutsSelect() {
  const sel = document.getElementById("gutsRecovery");
  sel.innerHTML = "";
  for (let i = 6; i <= 19; i++) {
    const o = document.createElement("option");
    o.value = i; o.textContent = i;
    if (i === (state.gutsRecovery || 15)) o.selected = true;
    sel.appendChild(o);
  }
}

function saveGutsRecovery() {
  state.gutsRecovery = parseInt(document.getElementById("gutsRecovery").value) || 15;
  saveState();
}

function saveMonGutsRecovery() {
  const m = currentMon(); if (!m) return;
  m.gutsRecovery = parseInt(document.getElementById("monGutsRecovery").value) || 15;
  saveState();
  renderTechs();
}

function renderGrid() {
  const grid = document.getElementById("monsterGrid");
  grid.innerHTML = "";
  Object.keys(MONSTER_DATA).forEach(name => {
    const noTech = NO_TECH.has(name);
    const cell = document.createElement("div");
    cell.className = "monster-cell" + (noTech ? " no-tech" : "");
    cell.title = name;
    if (!noTech) {
      cell.addEventListener("click", () => addMonsterByName(name));
    }
    if (ICONS[name]) {
      const img = document.createElement("img");
      img.src = ICONS[name];
      img.alt = name;
      img.loading = "lazy";
      cell.appendChild(img);
    } else {
      const placeholder = document.createElement("div");
      placeholder.style.cssText = "width:100%;aspect-ratio:1;background:var(--color-background-secondary);border-radius:6px";
      cell.appendChild(placeholder);
    }
    const label = document.createElement("span");
    label.textContent = name;
    cell.appendChild(label);
    grid.appendChild(cell);
  });
}

function currentMon() { return state.monsters.find(m => m.id === state.current) || null; }

function addMonsterByName(name) {
  // グリッドを閉じる
  const grid = document.getElementById("monsterGrid");
  const btn = document.getElementById("gridToggleBtn");
  grid.style.display = "none";
  btn.textContent = "＋ 種族を選んで追加";
  // 既存モンスターなら選択
  const existing = state.monsters.find(m => m.name === name);
  if (existing) { state.current = existing.id; renderAll(); return; }
  const gr = parseInt(document.getElementById("gutsRecovery").value) || 15;
  const m = {id:Date.now(), name, techs:[], session:false, log:[], gutsRecovery:gr};
  state.monsters.push(m);
  state.current = m.id;
  saveState(); renderAll(); showTechSelect();
}

function deleteMon(id) {
  if (!confirm("このモンスターのデータを削除しますか？\n（技の履歴データも全て削除されます）")) return;
  const m = state.monsters.find(m => m.id === id);
  if (m && state.techHistory[m.name]) delete state.techHistory[m.name];
  state.monsters = state.monsters.filter(m => m.id !== id);
  if (state.current === id) state.current = state.monsters.length ? state.monsters[0].id : null;
  saveState(); renderAll();
}

function selectMon(id) {
  state.current = id;
  document.getElementById("techSelectCard").style.display = "none";
  renderAll();
}

function showTechSelect() {
  const m = currentMon(); if (!m) return;
  const allTechs = MONSTER_DATA[m.name] || [];
  if (!allTechs.length) return;
  techCheckState = {};
  const activeTechKeys = new Set(m.techs.map(t => techKey(t)));
  allTechs.forEach((t,i) => { techCheckState[i] = activeTechKeys.has(techKey(t)); });
  renderTechCheckList();
  document.getElementById("techSelectCard").style.display = "block";
  document.getElementById("mainArea").style.display = "none";
}

function renderTechCheckList() {
  const m = currentMon(); if (!m) return;
  const allTechs = MONSTER_DATA[m.name] || [];
  const cnt = Object.values(techCheckState).filter(Boolean).length;
  document.getElementById("techSelectCount").textContent = cnt + "件選択中";
  const hist = state.techHistory[m.name] || {};
  const list = document.getElementById("techCheckList");
  list.innerHTML = "";
  allTechs.forEach((t, i) => {
    const label = document.createElement("label");
    label.className = "tech-check-item" + (techCheckState[i] ? " selected" : "");
    label.addEventListener("click", () => toggleTechCheck(i));
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !!techCheckState[i];
    cb.addEventListener("click", e => { e.stopPropagation(); toggleTechCheck(i); });
    label.appendChild(cb);
    const textSpan = document.createElement("span");
    textSpan.className = "tech-check-label";
    textSpan.textContent = t.from + " → ";
    const strong = document.createElement("strong");
    strong.textContent = t.to;
    textSpan.appendChild(strong);
    if (t.milestone) {
      const ms = document.createElement("span");
      ms.className = "milestone-badge";
      ms.textContent = "+" + t.milestone.to + "@" + t.milestone.need + "回";
      textSpan.appendChild(ms);
    }
    const saved = hist[techKey(t)];
    if (saved) {
      const si = document.createElement("span");
      si.style.cssText = "font-size:10px;color:#3B6D11;margin-left:4px";
      si.textContent = "（保存済:" + saved.total + "回）";
      textSpan.appendChild(si);
    }
    label.appendChild(textSpan);
    const sub = document.createElement("span");
    sub.className = "tech-check-sub";
    sub.textContent = "G:" + t.guts;
    label.appendChild(sub);
    list.appendChild(label);
  });
}

function toggleTechCheck(i) { techCheckState[i]=!techCheckState[i]; renderTechCheckList(); }

function applyTechSelection() {
  const m = currentMon(); if (!m) return;
  const allTechs = MONSTER_DATA[m.name] || [];
  const hist = state.techHistory[m.name] || {};
  const existingMap = {};
  m.techs.forEach(t => { existingMap[techKey(t)] = t; });
  m.techs = allTechs.filter((_,i) => techCheckState[i]).map((t,i) => {
    const k = techKey(t);
    // 既存データ優先 → 保存履歴 → 新規
    if (existingMap[k]) return existingMap[k];
    if (hist[k]) return {id:Date.now()+i, from:t.from, to:t.to, need:t.need, guts:t.guts, hit:t.hit, miss:t.miss, milestone:t.milestone||null, total:hist[k].total, session:0, done:hist[k].done};
    return {id:Date.now()+i, from:t.from, to:t.to, need:t.need, guts:t.guts, hit:t.hit, miss:t.miss, milestone:t.milestone||null, total:0, session:0, done:false};
  });
  saveState();
  document.getElementById("techSelectCard").style.display = "none";
  renderAll();
}

// 技データをhistoryに保存
function syncTechHistory(m) {
  if (!state.techHistory[m.name]) state.techHistory[m.name] = {};
  m.techs.forEach(t => {
    state.techHistory[m.name][techKey(t)] = {total:t.total, done:t.done};
  });
}

function changeSession(techId, delta) {
  const m = currentMon(); if (!m || !m.session) return;
  const t = m.techs.find(t => t.id === techId); if (!t || t.done) return;
  t.session = Math.max(0, (t.session||0) + delta);
  saveState(); renderTechs();
}

function startSession() {
  const m = currentMon(); if (!m) return;
  m.session = true; m.techs.forEach(t => t.session=0);
  saveState(); renderAll();
}

function confirmSession() {
  const m = currentMon(); if (!m) return;
  const gains = [];
  m.techs.forEach(t => {
    if (t.session > 0) { t.total += t.session; gains.push(`${t.from}+${t.session}`); if (t.total >= t.need) t.done = true; }
    t.session = 0;
  });
  m.session = false;
  m.log.unshift({type:"ok", text:`合格: ${gains.length?gains.join(", "):"なし"}`, date:new Date().toLocaleDateString("ja-JP")});
  syncTechHistory(m);
  saveState(); renderAll();
}

function cancelSession() {
  const m = currentMon(); if (!m) return;
  const discarded = m.techs.filter(t => t.session>0).map(t => `${t.from}+${t.session}`);
  m.techs.forEach(t => t.session=0);
  m.session = false;
  m.log.unshift({type:"ng", text:`やり直し: ${discarded.length?discarded.join(", ")+" を破棄":"なし"}`, date:new Date().toLocaleDateString("ja-JP")});
  saveState(); renderAll();
}

function renderAll() {
  const chips = document.getElementById("monsterChips");
  chips.innerHTML = "";
  state.monsters.forEach(m => {
    const wrap = document.createElement("div");
    wrap.className = "m-chip-wrap" + (m.id === state.current ? " sel" : "");
    const nameSpan = document.createElement("span");
    nameSpan.className = "m-chip-name";
    nameSpan.textContent = m.name;
    nameSpan.addEventListener("click", () => selectMon(m.id));
    const delSpan = document.createElement("span");
    delSpan.className = "m-chip-x";
    delSpan.textContent = "✕";
    delSpan.addEventListener("click", () => deleteMon(m.id));
    wrap.appendChild(nameSpan);
    wrap.appendChild(delSpan);
    chips.appendChild(wrap);
  });
  const m = currentMon();
  const main = document.getElementById("mainArea");
  if (!m) { main.style.display="none"; return; }
  main.style.display="block";
  document.getElementById("monLabel").textContent = m.name;
  // モンスターごとのガッツ回復セレクトを初期化
  const monGutsSel = document.getElementById("monGutsRecovery");
  monGutsSel.innerHTML = "";
  for (let i = 6; i <= 19; i++) {
    const o = document.createElement("option");
    o.value = i; o.textContent = i;
    if (i === (m.gutsRecovery || state.gutsRecovery || 15)) o.selected = true;
    monGutsSel.appendChild(o);
  }
  const badge = document.getElementById("sessionBadge");
  badge.className = m.session ? "badge-active" : "badge-idle";
  badge.textContent = m.session ? "大会中" : "大会なし";
  renderTechs(); renderSession(); renderLog();
}

function renderTechs() {
  const m = currentMon(); if (!m) return;
  const gr = m.gutsRecovery || state.gutsRecovery || 15;
  const body = document.getElementById("techBody");
  body.innerHTML = "";
  if (!m.techs.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 6;
    td.style.cssText = "text-align:center;color:var(--color-text-tertiary);padding:1.5rem";
    td.textContent = "技が選択されていません。「技を変更」から選択してください。";
    tr.appendChild(td);
    body.appendChild(tr);
    return;
  }
  m.techs.forEach(t => {
    const ih = calcIdeal(t.guts, t.hit, gr);
    const im = calcIdeal(t.guts, t.miss, gr);
    const pct = Math.min(100, Math.round((t.total / t.need) * 100));
    const tr = document.createElement("tr");
    // 技名セル
    const tdName = document.createElement("td");
    tdName.style.fontSize = "12px";
    const fromSpan = document.createElement("span");
    fromSpan.style.color = "var(--color-text-secondary)";
    fromSpan.textContent = t.from + " → ";
    const toStrong = document.createElement("strong");
    toStrong.textContent = t.to;
    tdName.appendChild(fromSpan);
    tdName.appendChild(toStrong);
    if (t.milestone) {
      const ms = document.createElement("div");
      ms.style.cssText = "font-size:10px;color:#856404;margin-top:2px";
      ms.textContent = t.milestone.need + "回→" + t.milestone.to + "も習得";
      tdName.appendChild(ms);
    }
    tr.appendChild(tdName);
    // 消費Gセル
    const tdG = document.createElement("td");
    tdG.textContent = t.guts;
    tr.appendChild(tdG);
    // 理想命中
    const tdIH = document.createElement("td");
    const ihSpan = document.createElement("span");
    ihSpan.className = "ideal-hit";
    ihSpan.textContent = ih;
    tdIH.appendChild(ihSpan);
    tr.appendChild(tdIH);
    // 理想外れ
    const tdIM = document.createElement("td");
    const imSpan = document.createElement("span");
    imSpan.className = "ideal-miss";
    imSpan.textContent = im;
    tdIM.appendChild(imSpan);
    tr.appendChild(tdIM);
    // 累計セル
    const tdTotal = document.createElement("td");
    if (t.done) {
      const doneSpan = document.createElement("span");
      doneSpan.className = "done-text";
      doneSpan.textContent = "✓完了";
      tdTotal.appendChild(doneSpan);
    } else {
      const numDiv = document.createElement("div");
      numDiv.style.cssText = "font-size:12px;white-space:nowrap";
      numDiv.textContent = t.total + "/" + t.need;
      const barWrap = document.createElement("div");
      barWrap.className = "progress-wrap";
      const barInner = document.createElement("div");
      barInner.className = "progress-inner";
      barInner.style.width = pct + "%";
      barWrap.appendChild(barInner);
      tdTotal.appendChild(numDiv);
      tdTotal.appendChild(barWrap);
    }
    tr.appendChild(tdTotal);
    // 今回セル
    const tdSession = document.createElement("td");
    if (m.session && !t.done) {
      const counter = document.createElement("div");
      counter.className = "counter";
      const btnMinus = document.createElement("button");
      btnMinus.textContent = "−";
      btnMinus.addEventListener("click", () => changeSession(t.id, -1));
      const valSpan = document.createElement("span");
      valSpan.className = "cnt-val";
      valSpan.textContent = t.session || 0;
      const btnPlus = document.createElement("button");
      btnPlus.textContent = "＋";
      btnPlus.addEventListener("click", () => changeSession(t.id, 1));
      counter.appendChild(btnMinus);
      counter.appendChild(valSpan);
      counter.appendChild(btnPlus);
      tdSession.appendChild(counter);
    } else {
      tdSession.style.color = "var(--color-text-tertiary)";
      tdSession.textContent = "—";
    }
    tr.appendChild(tdSession);
    body.appendChild(tr);
  });
}

function renderSession() {
  const m = currentMon(); if (!m) return;
  const sc = document.getElementById("sessionControls");
  sc.innerHTML = "";
  if (!m.session) {
    const btn = document.createElement("button");
    btn.className = "btn btn-primary";
    btn.style.cssText = "width:100%;padding:10px";
    btn.textContent = "大会開始";
    btn.addEventListener("click", startSession);
    sc.appendChild(btn);
  } else {
    sc.style.display = "flex";
    const btnOk = document.createElement("button");
    btnOk.className = "btn btn-ok";
    btnOk.style.cssText = "flex:1;padding:10px;font-size:14px";
    btnOk.textContent = "✓ 合格（累計に追加）";
    btnOk.addEventListener("click", confirmSession);
    const btnNg = document.createElement("button");
    btnNg.className = "btn btn-ng";
    btnNg.style.cssText = "flex:1;padding:10px;font-size:14px";
    btnNg.textContent = "✗ やり直し（破棄）";
    btnNg.addEventListener("click", cancelSession);
    sc.appendChild(btnOk);
    sc.appendChild(btnNg);
  }
}

function renderLog() {
  const m = currentMon(); if (!m) return;
  const la = document.getElementById("logArea");
  la.innerHTML = "";
  if (!m.log.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "まだ記録がありません";
    la.appendChild(empty);
    return;
  }
  m.log.slice(0, 15).forEach(l => {
    const item = document.createElement("div");
    item.className = "log-item";
    const typeSpan = document.createElement("span");
    typeSpan.className = l.type === "ok" ? "log-ok" : "log-ng";
    typeSpan.textContent = (l.type === "ok" ? "✓" : "✗") + " " + l.text;
    const dateSpan = document.createElement("span");
    dateSpan.style.cssText = "float:right;color:var(--color-text-tertiary)";
    dateSpan.textContent = l.date;
    item.appendChild(typeSpan);
    item.appendChild(dateSpan);
    la.appendChild(item);
  });
}

loadState();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
